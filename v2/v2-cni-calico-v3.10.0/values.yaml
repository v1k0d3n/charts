release_group: null

labels:
  app: false
  date: true
  component: false
  release_group: false
  typha_datastore:
    app: false
    k8s-app: calico-typha
  calico-node:
    app: false
    k8s-app: calico-node
  calico_kube_controllers:
    app: false
    k8s-app: calico-kube-controllers
  typha_autoscale_horz:
    app: false
    k8s-app: calico-typha-autoscaler
  typha_autoscale_vert:
    app: false
    k8s-app: calico-typha-autoscaler
  ## UNCOMMENT x2: CALICO TYPHA/NODE AUTOSCALING
  # node_vertical_autoscaler:
  #   app: false
  #   k8s-app: calico-node-autoscaler

pod:
  dns_policy: Default
  replicas:
    typha_datastore: 1
    ## UNCOMMENT x2: CALICO TYPHA/NODE AUTOSCALING
    typha_autoscale_vert: 1
    typha_autoscale_horz: 1
    # node_vertical_autoscaler: 1
  min_ready_seconds: 0
  lifecycle:
    typha_datastore:
      upgrades:
        deployments:
          revision_history: 5
          pod_replacement_strategy: RollingUpdate
          rolling_update:
            max_unavailable: 1
            max_surge: 1
      disruption_budget:
        typha_datastore:
          min_available: 1
      termination_grace_period:
        typha_datastore:
          timeout: 30
    calico_kube_controllers:
      upgrades:
        deployments:
          revision_history: 5
          pod_replacement_strategy: Recreate
      disruption_budget:
        calico_kube_controllers:
          min_available: 1
      termination_grace_period:
        calico_kube_controllers:
          timeout: 30
    calico:
      upgrades:
        daemonsets:
          pod_replacement_strategy: RollingUpdate
          calico_node:
            enabled: true
            min_ready_seconds: 0
            max_unavailable: 1
  tolerations:
    calico_node:
      enabled: true
      tolerations:
      - effect: NoSchedule
        operator: Exists
      - key: CriticalAddonsOnly
        operator: Exists
      - effect: NoExecute
        operator: Exists
    calico_kube_controllers:
      enabled: true
      tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/master
        effect: NoSchedule


  ## UNCOMMENT x2: CALICO PRIORITY CLASSES
  priority:
    class:
      typha_autoscale_vert: system-cluster-critical
      typha_autoscale_horz: system-cluster-critical
  #     node_vertical_autoscaler: system-cluster-critical
  #     typha_datastore: system-cluster-critical
  #     calico_node: system-cluster-critical

containers:
  typha_datastore:
    image: calico/typha:v3.10.0
    pull_policy: IfNotPresent
  calico_node:
    image: calico/node:v3.10.0
    pull_policy: IfNotPresent
  install_cni:
    image: calico/cni:v3.10.0
    pull_policy: IfNotPresent
  ipam_upgrade:
    image: calico/cni:v3.10.0
    pull_policy: IfNotPresent
  flexvol_driver:
    image: calico/pod2daemon-flexvol:v3.10.0
    pull_policy: IfNotPresent
  calico_kube_controllers:
    image: calico/kube-controllers:v3.10.0
    pull_policy: IfNotPresent
  ## UNCOMMENT x2: CALICO TYPHA/NODE AUTOSCALING
  typha_autoscale_horz:
    image: k8s.gcr.io/cluster-proportional-autoscaler-amd64:1.7.1
    pull_policy: IfNotPresent
  typha_autoscale_vert:
    image: k8s.gcr.io/cpvpa-amd64:v0.8.1
    pull_policy: IfNotPresent
  # node_vertical_autoscaler:
  #   image: k8s.gcr.io/cpvpa-amd64:v0.8.1
  #   pull_policy: IfNotPresent

args:
  ## UNCOMMENT x2: CALICO TYPHA/NODE AUTOSCALING
  typha_autoscale_vert:
    target: deployment/calico-typha
    logtostderr: true
    poll_period_seconds: 30
    config_file: /etc/config/typha-autoscaler
    v: 2
  typha_autoscale_horz:
    target: deployment/calico-typha
    logtostderr: true
    configmap: calico-typha-horizontal-autoscaler
    v: 2
  # node_vertical_autoscaler:
  #   target: daemonset/calico-node
  #   logtostderr: true
  #   poll_period_seconds: 30
  #   config_file: /etc/config/node-autoscaler
  #   v: 2

vars:
  typha_datastore:
    calico_typha:
      TYPHA_LOGSEVERITYSCREEN: "info"
      TYPHA_LOGFILEPATH: "none"
      TYPHA_LOGSEVERITYSYS: "none"
      TYPHA_CONNECTIONREBALANCINGMODE: "kubernetes"
      TYPHA_DATASTORETYPE: "kubernetes"
      TYPHA_HEALTHENABLED: "true"
      ## UNCOMMENT: TYPHA DEPLOYMENT SCALING
      # TYPHA_REPORTINGINTERVALSECS: "0"
      # TYPHA_MAXCONNECTIONSLOWERLIMIT: "1"
      ## UNCOMMENT: TYPHA PROMETHEUS METRICS
      # TYPHA_PROMETHEUSMETRICSENABLED: "true"
      # TYPHA_PROMETHEUSMETRICSPORT: "9093"
  calico_node:
    calico_node:
      CALICO_IPV4POOL_CIDR: "10.25.0.0/16"
      CALICO_DISABLE_FILE_LOGGING: "true"
      FELIX_DEFAULTENDPOINTTOHOSTACTION: "ACCEPT"
      FELIX_IPV6SUPPORT: "false"
      FELIX_LOGSEVERITYSCREEN: "info"
      FELIX_HEALTHENABLED: "true"
      CLUSTER_TYPE: "k8s,bgp"
      IP: "autodetect"
      CALICO_IPV4POOL_IPIP: "Always"
      DATASTORE_TYPE: "kubernetes"
      WAIT_FOR_DATASTORE: "true"
      FELIX_TYPHAK8SSERVICENAME:
        valueFrom:
          configMapKeyRef:
            name: calico-config
            key: typha_service_name
      NODENAME:
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
      CALICO_NETWORKING_BACKEND:
        valueFrom:
          configMapKeyRef:
            name: calico-config
            key: calico_backend
      FELIX_IPINIPMTU:
        valueFrom:
          configMapKeyRef:
            name: calico-config
            key: veth_mtu
      ## UNCOMMENT x2: CALICO v3.5.x VARIABLES
      # CALICO_NETWORKING_BACKEND: "none"
      # FELIX_LOGSEVERITYSYS: "none"
      # FELIX_PROMETHEUSMETRICSENABLED: "true"
      # FELIX_REPORTINGINTERVALSECS: "0"
      # FELIX_TYPHAK8SSERVICENAME: "calico-typha"
      # NO_DEFAULT_POOLS: "true"
    install_cni:
      CNI_CONF_NAME: "10-calico.conflist"
      SLEEP: "false"
      CNI_NETWORK_CONFIG:
        valueFrom:
          configMapKeyRef:
            name: calico-config
            key: cni_network_config
      KUBERNETES_NODE_NAME:
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
      CNI_MTU:
        valueFrom:
          configMapKeyRef:
            name: calico-config
            key: veth_mtu
      ## UNCOMMENT x2: ONLY WHEN CNI IS INSTALLING VIA ENV VARIABLES
      # CNI_CONF_NAME: "10-calico.conflist"
      # CNI_NETWORK_CONFIG: |-
      #   {"name":"k8s-pod-network","cniVersion":"0.3.0","plugins":[{"type":"calico","log_level":"debug","datastore_type":"kubernetes","nodename":"__KUBERNETES_NODE_NAME__","ipam":{"type":"host-local","subnet":"usePodCidr"},"policy":{"type":"k8s","k8s_auth_token":"__SERVICEACCOUNT_TOKEN__"},"kubernetes":{"k8s_api_root":"https://__KUBERNETES_SERVICE_HOST__:__KUBERNETES_SERVICE_PORT__","kubeconfig":"__KUBECONFIG_FILEPATH__"}},{"type":"portmap","capabilities":{"portMappings":true},"snat":true}]}
    ipam_upgrade:
      KUBERNETES_NODE_NAME:
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
      CALICO_NETWORKING_BACKEND:
        valueFrom:
          configMapKeyRef:
            name: calico-config
            key: calico_backend
  calico_kube_controllers:
    calico_kube_controllers:
      ENABLED_CONTROLLERS: node
      DATASTORE_TYPE: kubernetes

volumes:
  pods:
    calico_node:
    ## HINT: Calico Node
    - name: lib-modules
      hostPath:
        path: /lib/modules
    - name: var-run-calico
      hostPath:
        path: /var/run/calico
    - name: var-lib-calico
      hostPath:
        path: /var/lib/calico
    ## UNCOMMENT x2: WHEN RUNNING CALICO SMALL
    - name: xtables-lock
      hostPath:
        path: /run/xtables.lock
        type: FileOrCreate
    ## HINT: Used to install CNI binaries on the host
    - name: cni-bin-dir
      hostPath:
        path: /opt/cni/bin
    ## HINT: Used to install CNI network config on the host
    - name: cni-net-dir
      hostPath:
        path: /etc/cni/net.d
    ## UNCOMMENT x2: WHEN RUNNING CALICO CALICO MEDIUM/LARGE
    ## Mount in the Felix config file from the host.
    # - name: etc-calico
    #   hostPath:
    #     path: /etc/calico
    #
    # Required for v3.10.x
    - name: host-local-net-dir
      hostPath:
        path: /var/lib/cni/networks
    - name: policysync
      hostPath:
        type: DirectoryOrCreate
        path: /var/run/nodeagent
    - name: flexvol-driver-host
      hostPath:
        type: DirectoryOrCreate
        path: /usr/libexec/kubernetes/kubelet-plugins/volume/exec/nodeagent~uds
#### OLD:
    typha_autoscale_vert:
    - name: config
      configMap:
        name: calico-typha-vertical-autoscaler
    #node_vertical_autoscaler:
    #- name: config
    #  configMap:
    #    name: calico-node-vertical-autoscaler
    #typha_datastore:
    #- name: etc-calico
    #  hostPath:
    #    path: /etc/calico
  containers:
    calico_node:
    - mountPath: /lib/modules
      name: lib-modules
      readOnly: true
    - mountPath: /var/run/calico
      name: var-run-calico
      readOnly: false
    - mountPath: /var/lib/calico
      name: var-lib-calico
      readOnly: false
    ## UNCOMMENT x2: WHEN RUNNING CALICO SMALL
    - mountPath: /run/xtables.lock
      name: xtables-lock
      readOnly: false
    - name: policysync
      mountPath: /var/run/nodeagent
    ## UNCOMMENT x2: WHEN RUNNING CALICO MEDIUM/LARGE
    # - mountPath: /etc/calico
    #   name: etc-calico
    #   readOnly: true
    install_cni:
    - mountPath: /host/opt/cni/bin
      name: cni-bin-dir
    - mountPath: /host/etc/cni/net.d
      name: cni-net-dir
    ipam_upgrade:
    - mountPath: /var/lib/cni/networks
      name: host-local-net-dir
    - mountPath: /host/opt/cni/bin
      name: cni-bin-dir
    flexvol_driver:
    - name: flexvol-driver-host
      mountPath: /host/driver
#### OLD:
    typha_autoscale_vert:
    - name: config
      mountPath: /etc/config
    #node_vertical_autoscaler:
    #- name: config
    #  mountPath: /etc/config
    #typha_datastore:
    #- mountPath: /etc/calico
    #  name: etc-calico
    #  readOnly: true

# THIS IS ALL CORRECT:
config:
  common:
    crds:
      enabled: true
    datastore:
      type: kubernetes
    typha:
      enabled: true
      autoscaling:
        horizontal:
          enabled: false
        verticle:
          enabled: false
  configmap:
  node:
    cni:
      calico:
        cni_network_config: |-
          {"name":"k8s-pod-network","cniVersion":"0.3.1","plugins":[{"type":"calico","log_level":"info","datastore_type":"kubernetes","nodename":"__KUBERNETES_NODE_NAME__","mtu": __CNI_MTU__,"ipam":{"type":"calico-ipam"},"policy":{"type":"k8s"},"kubernetes":{"kubeconfig":"__KUBECONFIG_FILEPATH__"}},{"type":"portmap","snat":true,"capabilities":{"portMappings":true}}]}
  install_cni:
    calico_backend: "bird"
    typha_service_name: "calico-typha"
    veth_mtu: "1440"
  calico:
    cni_config: |-
      {"name":"k8s-pod-network","cniVersion":"0.3.1","plugins":[{"type":"calico","log_level":"info","datastore_type":"kubernetes","nodename":"__KUBERNETES_NODE_NAME__","mtu": __CNI_MTU__,"ipam":{"type":"calico-ipam"},"policy":{"type":"k8s"},"kubernetes":{"kubeconfig":"__KUBECONFIG_FILEPATH__"}},{"type":"portmap","snat":true,"capabilities":{"portMappings":true}}]}
  typha_autoscale_horz:
    ladder: |-
      {"coresToReplicas":[],"nodesToReplicas":[[1,1],[10,2],[100,3],[250,4],[500,5],[1000,6],[1500,7],[2000,8]]}
  typha_autoscale_vert:
    typha_autoscaler: |-
      {"calico-typha":{"requests":{"cpu":{"base":"120m","step":"80m","nodesPerStep":10,"max":"1000m"}}}}

