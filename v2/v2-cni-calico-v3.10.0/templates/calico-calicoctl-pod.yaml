{{- if .Values.manifests.calicoctl_pod }}
{{- $envAll := . }}
{{- $serviceAccountName := "calicoctl"}}

---
apiVersion: v1
kind: Pod
metadata:
  name: calicoctl
  namespace: {{ .Release.Namespace }}
spec:
  nodeSelector:
    beta.kubernetes.io/os: linux
  hostNetwork: true
  serviceAccountName: {{ $serviceAccountName }}
  containers:
  - name: calicoctl
    image: {{ .Values.containers.calicoctl.image }}
    imagePullPolicy: {{ .Values.containers.calicoctl.pull_policy }}
    command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
    env:
{{ include "kubernetes-common.utils.kubernetes_vars" .Values.vars.calicoctl.calicoctl | indent 4 }}
{{ end }}
